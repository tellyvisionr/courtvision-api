services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: courtvision
      POSTGRES_PASSWORD: courtvision
      POSTGRES_DB: courtvision
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtvision"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
