[tool.black]
line-length = 100
target-version = ["py313"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4"]
# E501 line-length is enforced by Black, not Ruff
ignore = ["E501"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency injection works by calling Depends() in default argument
# position — this is intentional and not the bug B008 is designed to catch.
extend-immutable-calls = ["Depends", "fastapi.Depends"]

[tool.ruff.lint.isort]
known-first-party = ["app"]
force-sort-within-sections = true

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["app"]

[tool.mypy]
python_version = "3.13"
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
strict_equality = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
# Add the project root to sys.path so `import app` resolves in CI
# (the runner's working directory is not on sys.path by default).
pythonpath = ["."]
markers = [
    "integration: marks tests as integration tests (require real API key)",
]

[tool.coverage.run]
source = ["app"]
omit = ["*/tests/*"]

[tool.coverage.report]
fail_under = 85
show_missing = true
