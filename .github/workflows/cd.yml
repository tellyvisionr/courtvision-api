# ─────────────────────────────────────────────────────────────────────────────
# CourtVision API — Continuous Delivery
#
# Trigger: pushes to main only (after a PR is merged).
#
# Currently: builds the Docker image and pushes it to ECR.
# Terraform deploy jobs (staging, prod) are intentionally omitted for now.
# Add them back once the infrastructure is validated manually via
# `terraform apply` from a local machine.
#
# Required GitHub Secrets  (Settings → Secrets and variables → Actions)
#   AWS_ACCESS_KEY_ID        IAM key with ECR push rights
#   AWS_SECRET_ACCESS_KEY    Corresponding secret key
#
# Required GitHub Variables (Settings → Secrets and variables → Variables)
#   AWS_REGION               Target region, e.g. us-east-1
#   ECR_REPOSITORY           ECR repo name,  e.g. courtvision-api
# ─────────────────────────────────────────────────────────────────────────────

name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  AWS_REGION:     ${{ vars.AWS_REGION     || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'courtvision-api' }}

jobs:

  build:
    name: Docker build & push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # reserved for future OIDC switch

    outputs:
      image: ${{ steps.set-image.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # :<sha>   — immutable ref pinned in Terraform
          # :latest  — rolling tag for local pulls / smoke tests
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Export image URI
        id: set-image
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" \
            >> "$GITHUB_OUTPUT"
