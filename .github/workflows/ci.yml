# ─────────────────────────────────────────────────────────────────────────────
# CourtVision API — Continuous Integration
#
# Trigger strategy
# ────────────────
# CI runs on *every* branch push and on every pull request so issues are
# caught as early as possible — on the feature branch itself, not only after
# the merge.  Running again on main after a merge acts as a safety net in
# case the merge introduced a conflict that wasn't caught locally.
#
# CD (build → ECR push → ECS deploy) lives in cd.yml and only fires on main,
# so feature branch pushes never touch production infrastructure.
#
# Gates enforced here:
#   lint  → Black (formatting), Ruff (linting + isort), mypy (type-check)
#   test  → pytest: unit tests, endpoint tests, integration tests (skipped
#            unless a real API key is present), coverage ≥ 85 %
#
# No AWS credentials needed — this workflow never touches infrastructure.
# Required secrets / variables: none (test key is a sentinel value).
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  # Run on every push to every branch so feature branches get feedback
  # immediately, without waiting for a PR to be opened.
  push:
  # Also run on PRs to catch any issues introduced by the merge itself
  # and to populate PR status checks used by branch-protection rules.
  pull_request:

# Default every job to read-only; escalate only where explicitly needed.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint & type-check ──────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # Install all deps so the `language: system` mypy hook in
      # .pre-commit-config.yaml can resolve cross-module imports.
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Hooks executed (in order):
      #   trailing-whitespace · end-of-file-fixer · check-yaml · check-toml
      #   check-merge-conflict · black · ruff --fix · mypy app/
      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  # ── 2. Unit & endpoint tests ──────────────────────────────────────────────
  test:
    name: Unit & endpoint tests (cov ≥ 85 %)
    runs-on: ubuntu-latest

    # Allow the test summary step to annotate the PR with coverage data.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Test categories (all in tests/test_balldontlie.py):
      #   • BallDontLieClient unit tests — async methods, retry / back-off logic
      #   • Endpoint tests               — FastAPI routes via httpx ASGITransport
      #   • Integration tests            — skipped when key == sentinel value
      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=85 \
            --junitxml=test-results.xml \
            -v
        env:
          # Sentinel keeps the app's startup guard happy.
          # Integration tests detect this value and self-skip.
          BALLDONTLIE_API_KEY: test-api-key

      # Write a Markdown coverage table to the Actions step summary so
      # engineers can read coverage at a glance without downloading artifacts.
      - name: Write coverage summary
        if: always()
        run: |
          echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          python -m coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

      # Retain XML reports for 14 days so downstream tooling (e.g. Codecov,
      # SonarCloud) can consume them without re-running the suite.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 14

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
